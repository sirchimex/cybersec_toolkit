{% extends 'base.html' %}
{% block title %}Register{% endblock %}
{% block content %}
<div class="row justify-content-center mt-4">
  <div class="col-md-5">
    <div class="cyber-card">
      <h2 class="cyber-title text-center mb-4" style="font-size:1.2rem;">// CREATE ACCOUNT //</h2>
      <form method="post">{% csrf_token %}
        {% for field in form %}
        <div class="mb-3">
          <label class="cyber-label">{{ field.label }}</label>
          <input type="{{ field.field.widget.input_type }}" name="{{ field.html_name }}" class="form-control cyber-input" placeholder="{{ field.label|lower }}">
          {% for error in field.errors %}<div style="color:var(--cyber-red);font-size:0.8rem;margin-top:4px;">{{ error }}</div>{% endfor %}
        </div>
        {% endfor %}
        <button type="submit" class="btn btn-cyber btn-cyber-green w-100 mt-2">CREATE ACCOUNT</button>
      </form>
    </div>
  </div>
</div>
{% endblock %}
